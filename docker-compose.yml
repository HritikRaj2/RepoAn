version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: devintel-db
    environment:
      POSTGRES_DB: smartrepo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Kolkata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: